project:
  type: website
  output-dir: docs

website:
  title: "Sansasyonel"
  description: "Turkish Housing Market Analysis, 2010–2024"
  navbar:
    background: dark
    foreground: light
    title: "Sansasyonel"
    left:
      - href: index.qmd
        text: Home
      - href: data.qmd
        text: Data
      - href: analysis.qmd
        text: Analysis
  page-footer:
    center: |
      Sansasyonel &nbsp;·&nbsp; EMU430 Data Analytics &nbsp;·&nbsp;
      Hacettepe University &nbsp;·&nbsp; Spring 2025–2026

format:
  html:
    theme:
      - flatly
      - assets/style.css
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    code-fold: true
    code-summary: "▶ Show code"
    code-tools: true
    fig-width: 9
    fig-height: 5
    fig-align: center
    df-print: paged
    smooth-scroll: true

execute:
  warning: false
  message: false
  echo: true
  freeze: false
